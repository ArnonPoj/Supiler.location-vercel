<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([13.75,100.50],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var driverMarker = null;

async function loadDriver(){

let res = await fetch('/api/driver_location')
let data = await res.json()

if(!driverMarker){

driverMarker = L.marker([data.lat,data.lon])
.addTo(map)

}else{

driverMarker.setLatLng([data.lat,data.lon])

}

}

setInterval(loadDriver,5000)

</script>

</body>
</html>
