<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สร้างงานจัดส่ง</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:120px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#ff8c00;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e67e00;
}

</style>
</head>

<body>

<div class="container">

<h2>สร้างงานจัดส่ง</h2>

<form method="POST" action="/create_job">

<label>ชื่อลูกค้า</label>
<input type="text" name="customer">

<label>เบอร์โทร</label>
<input type="text" name="phone">

<label>จุดรับสินค้า 1</label>
<input type="text" name="pickup1">

<label>จุดรับสินค้า 2</label>
<input type="text" name="pickup2">

<label>จุดส่งสินค้า</label>
<input type="text" name="dropoff">

<label>รายละเอียดสินค้า</label>
<textarea name="detail"></textarea>

<label>ค่าจัดส่ง</label>
<input type="number" name="price">

<button type="submit">สร้างงาน</button>

</form>

</div>

</body>
</html>
