<script>
  
  function showToast(message, duration = 3000) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, duration);
  }

  var map = L.map('mapid').setView([13.7563, 100.5018], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  var markers = [];
  var allMarkersData = [];
  var editingMarkerId = null;
  var tempMarker = null;

  async function loadMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const res = await fetch('/markers');
    allMarkersData = await res.json();
    applyFilterAndShowMarkers();
  }

  function applyFilterAndShowMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const searchText = document.getElementById('searchBox').value.trim().toLowerCase();
    const filtered = allMarkersData.filter(m => {
      const title = (m.title || '').toLowerCase();
      const tag = (m.tag || '').toLowerCase();
      return title.includes(searchText) || tag.includes(searchText);
    });

    filtered.forEach(m => {
      const popupContent = `
        <div>
          <b>${m.title}</b><br>
              
          <!-- กล่อง OLC สีเทา -->
          <button class="olc-chip" data-olc="${m.olc}" title="กดเพื่อคัดลอก OLC">
          ${m.olc || '-'}
          </button><br>

          <b>ที่อยู่:</b> ${m.address || '-'}<br>
          <b>รายละเอียด:</b> ${m.detail || '-'}<br>
          <b>tag:</b> ${m.tag || '-'}<br><br>
          <button onclick="editMarker(${m.id})" style="margin-right:8px;">แก้ไข</button>
          <button onclick="deleteMarker(${m.id})" style="color: red;">ลบหมุดนี้</button>
        </div>
      `;
      const marker = L.marker([m.lat, m.lon])
        .addTo(map)
        .bindTooltip(m.title || '', {
          permanent: true,
          direction: 'top',
          offset: [0, -10],
          className: 'marker-label'
        })
        .bindPopup(popupContent);
      markers.push(marker);
    });
  }


  // เมื่อคลิก OLC ให้คัดลอกไปยังคลิปบอร์ด
document.addEventListener("click", function(event) {
  if (event.target.classList.contains("olc-chip")) {
    const olc = event.target.getAttribute("data-olc");
    if (olc && olc !== '-') {
      navigator.clipboard.writeText(olc)
        .then(() => showToast(`✅ คัดลอก OLC: ${olc}`))
        .catch(() => showToast("❌ คัดลอก OLC ไม่สำเร็จ"));
    }
  }
});

  document.getElementById('searchBox').addEventListener('input', applyFilterAndShowMarkers);

  function showPopupForm() {
    document.getElementById('popupForm').style.display = 'block';
  }

  function hidePopupForm() {
    document.getElementById('popupForm').style.display = 'none';
    editingMarkerId = null;
    resetForm();
  }

  function resetForm() {
    document.getElementById('formTitle').textContent = 'เพิ่มหมุดใหม่';
    document.getElementById('popupName').value = '';
    document.getElementById('popupOLC').value = '';
    document.getElementById('popupAddress').value = '';
    document.getElementById('popupDetail').value = '';
    document.getElementById('popupTag').value = '';
    document.getElementById('savePopupBtn').textContent = 'บันทึก';
  }

  async function showTemporaryMarker(olc) {
  if (!olc) {
    showToast('กรุณากรอก OLC');
    return;
  }

  // ⭐ ต้องประกาศก่อนใช้
  const province =
    document.getElementById("provinceInput")?.value?.trim() || "";

  try {
    const res = await fetch("/decode_olc_temp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ olc, province })
    });

    const data = await res.json();
    if (!res.ok) return showToast(data.error || "ถอดรหัส OLC ไม่สำเร็จ");

    const { lat, lon } = data;

    if (tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker([lat, lon], {
      icon: L.icon({
        iconUrl: "https://maps.gstatic.com/intl/en_us/mapfiles/markers2/measle.png",
        iconSize: [12, 12],
        iconAnchor: [6, 6]
      })
    }).addTo(map)
      .bindPopup(`<b>หมุดชั่วคราว</b><br>OLC: ${olc}`)
      .openPopup();

    map.setView([lat, lon], 18);

  } catch (err) {
    console.error(err);
    showToast("เกิดข้อผิดพลาดในการปักหมุดชั่วคราว");
  }
}

function hidePopupForm() {
  document.getElementById('popupForm').style.display = 'none';
  editingMarkerId = null;
  resetForm();

  // ลบหมุดชั่วคราวถ้ามี
  if (tempMarker) {
    map.removeLayer(tempMarker);
    tempMarker = null;
  }
}

  document.getElementById("floatBtn").onclick = function() {
    if (document.getElementById('popupForm').style.display === 'block') {
      hidePopupForm();
    } else {
      resetForm();
      showPopupForm();
    }
  };

  document.getElementById('cancelPopupBtn').onclick = hidePopupForm;

  document.getElementById('savePopupBtn').onclick = async function() {
    const title = document.getElementById('popupName').value.trim();
    const olc = document.getElementById('popupOLC').value.trim();
    const address = document.getElementById('popupAddress').value.trim();
    const detail = document.getElementById('popupDetail').value.trim();
    const tag = document.getElementById('popupTag').value.trim();

    if (!title) return showToast('กรุณากรอกชื่อสถานที่');
    if (!olc) return showToast('กรุณากรอก OLC (Plus Code)');

    const payload = { title, olc, address, detail, tag };
    let url = '/add_marker', method = 'POST';

    if (editingMarkerId !== null) {
      url = `/edit_marker/${editingMarkerId}`;
      method = 'PUT';
    }

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    if (res.ok) {
      showToast(editingMarkerId === null ? 'เพิ่มหมุดสำเร็จ' : 'แก้ไขหมุดสำเร็จ');
      hidePopupForm();
      loadMarkers();
    } else {
      showToast('ผิดพลาด: ' + result.error);
    }
  };

  async function deleteMarker(id) {
    if (!confirm('ต้องการลบหมุดนี้หรือไม่?')) return;

    const res = await fetch(`/delete_marker/${id}`, { method: 'DELETE' });
    const result = await res.json();

    if (res.ok) {
      showToast('ลบหมุดสำเร็จ');
      loadMarkers();
    } else {
      showToast('ลบไม่สำเร็จ: ' + (result.error || ''));
    }
  }

  async function editMarker(id) {
    const res = await fetch(`/marker/${id}`);
    if (!res.ok) return showToast('ไม่พบข้อมูลหมุด');

    const data = await res.json();
    editingMarkerId = id;

    document.getElementById('formTitle').textContent = 'แก้ไขหมุด';
    document.getElementById('popupName').value = data.title || '';
    document.getElementById('popupOLC').value = data.olc || '';
    document.getElementById('popupAddress').value = data.address || '';
    document.getElementById('popupDetail').value = data.detail || '';
    document.getElementById('popupTag').value = data.tag || '';
    document.getElementById('savePopupBtn').textContent = 'บันทึกการแก้ไข';
    showPopupForm();
  }

  document.getElementById('importInput').addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/import', {
        method: 'POST',
        body: formData
      });

      const result = await res.json();
      if (res.ok) {
        showToast('นำเข้าหมุดเรียบร้อยแล้ว');
        loadMarkers();
      } else {
        showToast('นำเข้าไม่สำเร็จ: ' + (result.error || ''));
      }
    } catch (err) {
      showToast('เกิดข้อผิดพลาดขณะนำเข้าไฟล์');
    }
  });

  loadMarkers();
</script>

});

<script>
function openTransportPopup() {
  // ถ้า popup เปิดอยู่ → ปิด
  if (popup.style.display === "block") {
    closeTransportPopup();
    return;
  }

  // ถ้ายังไม่เปิด → เปิด
  popup.style.display = "block";
  areas = [];
  document.getElementById("areaList").innerHTML = "";

  const checked = document.querySelector(
    'input[name="transportType"]:checked'
  );

  if (checked && checked.value === "person") {
    formArea.innerHTML =
      document.getElementById("personFormTemplate").innerHTML;

    initAreaSearch();
  } else {
    formArea.innerHTML =
      '<p class="hint">กรุณาเลือกประเภทขนส่ง</p>';
  }
}
</script>

<script>
function closeTransportPopup() {
  popup.style.display = "none";

  // เคลียร์ state
  areas = [];
  document.getElementById("areaList").innerHTML = "";

  // 🔥 เคลียร์ไฮไลท์อำเภอทั้งหมด
  clearHighlightDistricts();
}
</script>

<script>
function bindSearch(inputId, listId, items, onSelect) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  if (!input || !list || !items) return;

  input.oninput = () => {
    const q = input.value.trim();
    list.innerHTML = "";
    if (!q) return;

    items
      .filter(i => i.includes(q))
      .forEach(i => {
        const div = document.createElement("div");
        div.textContent = i;
        div.onclick = () => {
          input.value = i;
          list.innerHTML = "";
          onSelect(i);
        };
        list.appendChild(div);
      });
  };
}
</script>


<script>
function loadDrivers(latlon, province, district) {
  console.log("LOAD DRIVERS CALLED:", province, district);

  fetch(
    `/api/transport/personal/by-area?province=${encodeURIComponent(province)}&district=${encodeURIComponent(district)}`
  )
    .then(r => r.json())
    .then(drivers => {
      console.log("DRIVERS =", drivers);
      showDriverPopup(latlon, district, drivers);
    })
    .catch(err => {
      console.error(err);
      showDriverPopup(latlon, district, []);
    });
}


function initAreaSearch() {
  let selectedProvince = null;
  let selectedDistrict = null;

  bindSearch(
    "provinceInput",
    "provinceList",
    Object.keys(AREA_MAP),
    province => {
      selectedProvince = province;

      document.getElementById("districtInput").value = "";
      document.getElementById("subdistrictInput").value = "";

      // ✅ ใช้ AREA_MAP ตรง ๆ (เป็น array)
      bindSearch(
        "districtInput",
        "districtList",
        AREA_MAP[province],
        district => {
          selectedDistrict = district;
          document.getElementById("subdistrictInput").value = "";

          // ตอนนี้คุณยังไม่มีตำบล → ส่ง array ว่างไปก่อน
          bindSearch(
            "subdistrictInput",
            "subdistrictList",
            [],
            () => {}
          );
        }
      );
    }
  );
}

async function startApp() {
  await loadAreaData();   // ✅ รอข้อมูล
  initAreaSearch();
}

startApp();

let areas = [];
    
function addArea() {
  const p = document.getElementById("provinceInput").value;
  const d = document.getElementById("districtInput").value;
  const s = document.getElementById("subdistrictInput").value || null;

  if (!p) return alert("กรุณาเลือกจังหวัด");

  areas.push({
    province: normalizeProvinceName(p),
    district: d ? normalizeDistrictName(d) : null,
    subdistrict: s
  });



  const li = document.createElement("li");
  li.textContent =
    p +
    (d ? " / " + d : " (ทั้งจังหวัด)") +
    (s ? " / " + s : "");

  document.getElementById("areaList").appendChild(li);

  document.getElementById("districtInput").value = "";
  document.getElementById("subdistrictInput").value = "";

  // ⭐ ไฮไลท์แบบสะสม
  if (d) {
    highlightedDistricts.add(normalizeDistrictName(d));
    highlightDistricts();
  }
}


async function saveTransport() {
  const type = document.querySelector(
    'input[name="transportType"]:checked'
  )?.value;

  if (type !== "person") {
    alert("ตอนนี้รองรับเฉพาะ รถกระบะ (บุคคล)");
    return;
  }

   const payload = {
    transport_type: "person",
    owner_name: document.getElementById("p_name")?.value.trim(),
    license_plate: document.getElementById("p_plate")?.value.trim(),
    vehicle_type: document.getElementById("p_truck_type")?.value,
    capacity_ton: document.getElementById("p_capacity")?.value,
    phone: document.getElementById("p_phone")?.value.trim(),
    line: document.getElementById("p_line")?.value.trim(),
    areas: areas
  };

  if (!payload.owner_name || !payload.phone) {
    alert("กรุณากรอกชื่อคนขับ และเบอร์โทร");
    return;
  }
 
  if (areas.length === 0) {
    alert("กรุณาเพิ่มพื้นที่อย่างน้อย 1 พื้นที่");
    return;
  }

  try {
    const res = await fetch("/save_transport_personal", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "บันทึกไม่สำเร็จ");
      return;
    }

    alert("บันทึกสำเร็จ");
    closeTransportPopup();
    areas = [];
    document.getElementById("areaList").innerHTML = "";

  } catch (err) {
    console.error(err);
    alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
  }
}


</script>

<script>
fetch("/static/thailand_district.geojson")
  .then(res => res.json())
  .then(data => {

    districtLayer = L.geoJSON(data, {
      style: {
        color: "#555",
        weight: 1,
        fillOpacity: 0
      },
      onEachFeature: (feature, layer) => {

        const province = normalizeProvinceName(
        feature.properties.NL_NAME_1
        );   // จังหวัด
        const district = feature.properties.NL_NAME_2; // อำเภอ

        // hover เห็นชื่ออำเภอ
        layer.bindTooltip(district, { sticky: true });

        // 🔥 double click อำเภอ
        layer.on("dblclick", e => {
          const province = normalizeProvinceName(
          feature.properties.NL_NAME_1
          );

          const district = normalizeDistrictName(
          feature.properties.NL_NAME_2
          );

          loadDrivers(e.latlon, province, district);
          });
      }
    }).addTo(map);
  });

// สำคัญมาก ❗ ปิด zoom จาก double click
map.doubleClickZoom.disable();
</script>


<!-- pop up คนขับ -->
<script>
function showDriverPopup(latlon, district, drivers) {
  let html = `<h4>🚚 รถในอำเภอ${district}</h4>`;

  if (!drivers || drivers.length === 0) {
    html += `<p>ไม่มีรถในพื้นที่นี้</p>`;
  } else {
    drivers.forEach(d => {
      html += `
        <div style="margin-bottom:8px;">
          <b>${d.name}</b><br>
          ${d.vehicle_type} (${d.capacity} ตัน)<br>
          📞 ${d.phone}
        </div>
      `;
    });
  }

  L.popup({ maxWidth: 300 })
    .setLatlng(latlon)
    .setContent(html)
    .openOn(map);
}
</script>

<script>
let highlightedDistricts = new Set();
</script>

  
<script>
function normalizeDistrictName(name) {
  if (!name) return "";
  return name
    .replace("อำเภอ", "")
    .replace("เขต", "")
    .replace("อ.", "")
    .trim();
}

function highlightDistricts() {
  if (!districtLayer) return;

  districtLayer.eachLayer(layer => {
    const geoNameRaw =
      layer.feature.properties?.NL_NAME_2 ||
      layer.feature.properties?.NAME_2 ||
      "";

    const geoName = normalizeDistrictName(geoNameRaw);

    if (highlightedDistricts.has(geoName)) {
      layer.setStyle({
        color: "#ff6600",
        weight: 3,
        fillOpacity: 0.35
      });
    } else {
      layer.setStyle({
        color: "#999",
        weight: 1,
        fillOpacity: 0.05
      });
    }
  });
}

function clearHighlightDistricts() {
  highlightedDistricts.clear();
  highlightDistricts();
}

// expose
window.highlightDistricts = highlightDistricts;
</script>

<script>
function normalizeProvinceName(name) {
  if (!name) return "";
  return name
    .replace("จังหวัด", "")
    .trim();
}
</script>
